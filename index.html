<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMEO — Chargement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="splash.css">
</head>
<body>

<!-- Particules de fond -->
<canvas id="particles"></canvas>

<!-- Scène principale -->
<div class="splash-scene">

  <!-- Logo + Titre -->
  <div class="brand-block">
    <div class="brand-logo">
      <div class="logo-ring outer"></div>
      <div class="logo-ring inner"></div>
      <div class="logo-core">
        <span class="logo-letter">C</span>
      </div>
    </div>
    <div class="brand-name">COMEO</div>
    <div class="brand-tagline">Plan Comptable · Tables Financières · OHADA</div>
  </div>

  <!-- Citation -->
  <div class="quote-block">
    <div class="quote-ornament left">"</div>
    <p class="quote-text" id="quoteText"></p>
    <div class="quote-ornament right">"</div>
    <div class="quote-author" id="quoteAuthor"></div>
  </div>

  <!-- Décompte -->
  <div class="countdown-block">
    <div class="countdown-ring-wrap">
      <svg class="ring-svg" viewBox="0 0 120 120">
        <circle class="ring-track" cx="60" cy="60" r="52"/>
        <circle class="ring-progress" id="ringProgress" cx="60" cy="60" r="52"/>
      </svg>
      <div class="countdown-num" id="countdownNum">7</div>
    </div>
    <div class="countdown-label">Chargement de l'application</div>
    <div class="skip-wrap">
      <a href="main.html" class="skip-btn" id="skipBtn">
        <span>Accéder maintenant</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>
  </div>

  <!-- Barre de chargement -->
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Pied de page -->
  <div class="splash-footer">
    <span>SYSCOHADA Révisé 2023</span>
    <span class="dot">·</span>
    <span>1 412 comptes</span>
    <span class="dot">·</span>
    <span>5 Tables Financières</span>
  </div>

</div>

<script src="splash.js"></script>
</body>
</html>
